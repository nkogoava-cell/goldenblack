<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GoldenBlack</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Header -->
<header>
    <h1>GoldenBlack</h1>
    <p>Le futur de la K-pop commence ici 🌌</p>
</header>

<!-- Section Musique -->
<section id="musique">
    <h2>Nos Mélodies IA</h2>
    <div class="player">
        <p>Neon Shadows</p>
        <audio controls>
            <source src="melodie1.mp3" type="audio/mpeg">
        </audio>
    </div>
    <div class="player">
        <p>Golden Venom</p>
        <audio controls>
            <source src="melodie2.mp3" type="audio/mpeg">
        </audio>
    </div>
    <div class="player">
        <p>Clash</p>
        <audio controls>
            <source src="melodie3.mp3" type="audio/mpeg">
        </audio>
    </div>
</section>

<!-- Section Moodboard / Visuels -->
<section id="visuels">
    <h2>Univers visuel</h2>
    <img src="moodboard1.jpg" alt="Moodboard 1">
    <img src="moodboard2.jpg" alt="Moodboard 2">
    <img src="moodboard3.jpg" alt="Moodboard 3">
</section>

<!-- Fanclub -->
<section id="fanclub">
    <h2>Rejoins le Fanclub</h2>
    <form>
        <input type="text" placeholder="Ton prénom" required>
        <input type="email" placeholder="Ton email" required>
        <button type="submit">S'inscrire</button>
    </form>
</section>

</body>
</html>
